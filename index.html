<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile HTML Exporter</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-color: #050505;
            --card-bg: rgba(20, 20, 20, 0.9);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* Tuân thủ quy tắc lề: 30px trên, 3px hai bên */
            margin: 30px 3px 0 3px;
            background-color: var(--bg-color);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .header-area {
            text-align: center;
            padding: 10px 0;
        }

        h2 {
            color: var(--neon-blue);
            font-size: 1.4rem;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--neon-blue);
            margin: 0;
        }

        .editor-wrapper {
            position: relative;
            background: var(--card-bg);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        textarea {
            width: 100%;
            /* Tự động điều chỉnh chiều cao theo màn hình điện thoại */
            height: 60vh; 
            background: transparent;
            color: #00ff41;
            border: none;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            display: block;
        }

        .action-bar {
            padding: 10px 5px;
            display: flex;
            justify-content: center;
        }

        button {
            width: 100%;
            max-width: 300px;
            background: linear-gradient(45deg, #000, #111);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.95);
            background: var(--neon-blue);
            color: #000;
        }

        /* Modal cho Mobile */
        #filenameModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .modal-content {
            background: #111;
            width: 100%;
            max-width: 320px;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--neon-purple);
            text-align: center;
            box-shadow: 0 0 25px var(--neon-purple);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 5px;
            font-size: 16px;
            text-align: center;
        }

        .modal-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .m-btn {
            padding: 12px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid;
            background: transparent;
        }

        .confirm-btn { color: var(--neon-blue); border-color: var(--neon-blue); }
        .cancel-btn { color: #ff4444; border-color: #ff4444; }

    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2>HTML EXPORTER</h2>
    </div>

    <div class="editor-wrapper">
        <textarea id="codeInput" placeholder="Dán mã code tại đây..." spellcheck="false"></textarea>
    </div>
    
    <div class="action-bar">
        <button onclick="showModal()">XUẤT FILE NGAY</button>
    </div>
</div>

<div id="filenameModal">
    <div class="modal-content">
        <div style="color: var(--neon-purple); font-weight: bold;">TÊN FILE LÀ GÌ?</div>
        <input type="text" id="fileName" placeholder="index" value="index">
        <div class="modal-btns">
            <button class="m-btn cancel-btn" onclick="closeModal()">HỦY</button>
            <button class="m-btn confirm-btn" onclick="exportHTML()">TẢI VỀ</button>
        </div>
    </div>
</div>

<script>
    const modal = document.getElementById('filenameModal');
    const codeInput = document.getElementById('codeInput');
    const fileNameInput = document.getElementById('fileName');

    function showModal() {
        if (!codeInput.value.trim()) {
            alert("Bạn chưa nhập code!");
            return;
        }
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    function exportHTML() {
        const content = codeInput.value;
        let filename = fileNameInput.value.trim() || 'index';
        
        if (!filename.endsWith('.html')) {
            filename += '.html';
        }

        const blob = new Blob([content], { type: 'text/html' });
        const link = document.createElement('a');
        
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        closeModal();
    }

    // Đóng modal khi chạm vùng ngoài
    window.onclick = function(e) {
        if (e.target == modal) closeModal();
    }
</script>

</body>
</html>
